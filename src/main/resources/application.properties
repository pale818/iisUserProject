spring.application.name=iis_users_project

# Use a simple local H2 file database for this student project.
spring.datasource.url=jdbc:h2:file:./data/iis_users_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create/update tables automatically during development.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Enable the H2 browser console for quick inspection.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Read the ReqRes API key from the IntelliJ run configuration.
reqres.api-key=${REQRES_API_KEY:}
