spring.application.name=iis_users_project

# Use a simple local H2 file database for this student project.
spring.datasource.url=jdbc:h2:file:./data/iis_users_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create/update tables automatically during development.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Enable the H2 browser console for quick inspection.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ReqRes API key — keep this for development, replace with env var for production.
reqres.api-key=${REQRES_API_KEY:reqres_4069f4ecc3d746579c1633cc62e1b89c}

# JWT — base64-encoded secret (32 bytes = 256 bits, enough for HMAC-SHA256)
jwt.secret=bXlTZWNyZXRLZXkxMjM0NTY3ODkwYWJjZGVmZ2hpams=
jwt.access-token-expiry-ms=900000
jwt.refresh-token-expiry-ms=604800000

# gRPC server port
grpc.server.port=9090
